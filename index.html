*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:40px 0;font-family:var(--font-sans)}

.top-bar .sub{font-size:12px;color:var(--color-text-secondary);margin-top:3px}
.cols{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:14px}
.col-btn{border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:8px 4px;cursor:pointer;text-align:center;background:var(--color-background-secondary);transition:opacity .15s,border-color .15s;user-select:none}

.detail{border:0.5px solid var(--color-border-tertiary);border-radius:10px;overflow:hidden;margin-bottom:14px}

.detail-head .desc{font-size:12px;color:var(--color-text-secondary);margin-top:1px}
.levels{padding:0 16px 14px}
.level-row{border-top:0.5px solid var(--color-border-tertiary);padding:10px 0}
.level-row:first-child{border-top:none}
.level-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.level-badge{font-size:10px;padding:1px 7px;border-radius:99px;font-weight:500}
.bullets{list-style:none;display:flex;flex-direction:column;gap:4px}
.bullets li{font-size:12px;color:var(--color-text-primary);padding-left:14px;position:relative;line-height:1.5}
.bullets li::before{content:"";position:absolute;left:3px;top:7px;width:4px;height:4px;border-radius:50%;background:var(--color-border-primary)}
.diff-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:4px;font-weight:500;vertical-align:middle}
.new-badge{background:var(--color-background-warning);color:var(--color-text-warning);font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500}
.hint{font-size:11px;color:var(--color-text-tertiary);text-align:center;padding:4px 0}
</style>
