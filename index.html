<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BEAM Scaling Framework</title>
<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f8;color:#1a2f45;min-height:100vh}

/* ── Layout Shell ── */
.app{display:flex;flex-direction:column;min-height:100vh}

/* ── Top Bar ── */
.topbar{background:#1b3a6b;padding:16px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.topbar-dot{width:10px;height:10px;border-radius:50%;background:#5dcaa5;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:.01em}
.topbar-sub{font-size:12px;color:#a8c4e0;margin-left:4px}
.topbar-tag{margin-left:auto;font-size:11px;font-weight:600;background:rgba(93,202,165,.18);color:#5dcaa5;padding:4px 10px;border-radius:99px;letter-spacing:.04em;white-space:nowrap}

/* ── Main Body ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:280px;flex-shrink:0;background:#1b3a6b;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sidebar-section-label{font-size:10px;font-weight:700;color:#4a7aaa;letter-spacing:.1em;text-transform:uppercase;padding:16px 18px 6px}

/* Domain item */
.domain-item{border-bottom:1px solid rgba(255,255,255,.05)}
.domain-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:12px 18px;display:flex;align-items:center;gap:10px;transition:background .15s}
.domain-btn:hover{background:rgba(255,255,255,.06)}
.domain-btn.active{background:rgba(93,202,165,.13);border-left:3px solid #5dcaa5}
.domain-btn:not(.active){border-left:3px solid transparent}
.domain-color{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.domain-btn-inner{flex:1;min-width:0}
.domain-btn-label{font-size:13px;font-weight:500;color:#c8d8e8;line-height:1.3;display:block;transition:color .15s}
.domain-btn.active .domain-btn-label{color:#e8f4ff;font-weight:600}
.domain-btn-badge{font-size:10px;color:#4a7aaa;display:block;margin-top:1px}
.domain-btn.active .domain-btn-badge{color:#5dcaa5}
.chevron{font-size:10px;color:#3a6a9a;transition:transform .2s;flex-shrink:0;margin-left:auto}
.domain-btn.active .chevron{transform:rotate(90deg);color:#5dcaa5}

/* Level sub-list */
.level-list{overflow:hidden;max-height:0;transition:max-height .3s ease}
.level-list.open{max-height:300px}
.level-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:9px 18px 9px 38px;display:flex;align-items:center;gap:8px;transition:background .15s}
.level-btn:hover{background:rgba(255,255,255,.05)}
.level-btn.active{background:rgba(93,202,165,.1)}
.level-num-pill{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.level-btn-label{font-size:12px;color:#8ab0d0;line-height:1.3;flex:1}
.level-btn.active .level-btn-label{color:#c8e8f8;font-weight:500}
.level-chevron{font-size:9px;color:#3a6a9a;transition:transform .2s;margin-left:auto;flex-shrink:0}
.level-btn.active .level-chevron{transform:rotate(90deg);color:#5dcaa5}

/* ── Main Content ── */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:28px;display:flex;flex-direction:column;gap:20px;min-width:0}

/* Domain header card */
.domain-header-card{background:#fff;border-radius:14px;border:1px solid #d8e8f4;padding:22px 24px}
.domain-header-row{display:flex;align-items:flex-start;gap:14px}
.domain-icon-wrap{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.domain-icon-wrap svg{width:22px;height:22px}
.domain-name{font-size:22px;font-weight:700;color:#0d1b2a;line-height:1.2}
.domain-badge-pill{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.05em;text-transform:uppercase;margin-left:8px;vertical-align:middle}
.domain-desc-text{font-size:14px;color:#4a6a8a;line-height:1.7;margin-top:8px}

/* Level cards grid */
.levels-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.level-card{background:#fff;border-radius:12px;border:1.5px solid #e2ecf6;overflow:hidden;transition:border-color .2s,box-shadow .2s;cursor:pointer}
.level-card:hover{border-color:#a8c4e0;box-shadow:0 2px 12px rgba(27,58,107,.07)}
.level-card.selected{border-color:#1b3a6b;box-shadow:0 2px 16px rgba(27,58,107,.12)}
.level-card-header{padding:14px 16px 12px}
.level-card-num-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.lc-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.lc-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.03em;text-transform:uppercase}
.level-card-name{font-size:13px;font-weight:600;color:#1a2f45;line-height:1.4}
.level-card-bullets{padding:10px 16px 14px;border-top:1px solid #eef4fa;list-style:none;display:flex;flex-direction:column;gap:6px}
.level-card-bullets li{font-size:12px;color:#3d5a7a;line-height:1.5;padding-left:13px;position:relative}
.level-card-bullets li::before{content:"";position:absolute;left:2px;top:6px;width:5px;height:5px;border-radius:50%;background:#1b3a6b;opacity:.35}

/* Expanded detail panel */
.detail-panel{background:#fff;border-radius:14px;border:1px solid #c0d8f0;overflow:hidden;animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.detail-panel-head{background:#1b3a6b;padding:16px 22px;display:flex;align-items:center;gap:10px}
.detail-panel-head-num{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.detail-panel-head-name{font-size:15px;font-weight:600;color:#fff}
.detail-panel-head-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:auto;text-transform:uppercase;letter-spacing:.04em}
.detail-sections{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:none}
.detail-section{padding:18px 22px;border-right:1px solid #eef4fa;border-bottom:1px solid #eef4fa}
.detail-section:nth-child(even){border-right:none}
.detail-section:nth-last-child(-n+2){border-bottom:none}
.detail-section-title{font-size:11px;font-weight:700;color:#1b3a6b;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.detail-section-title .ds-icon{width:14px;height:14px;opacity:.7}
.detail-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.detail-list li{font-size:13px;color:#2d4a6a;line-height:1.55;padding-left:14px;position:relative}
.detail-list li::before{content:"";position:absolute;left:0;top:7px;width:5px;height:5px;border-radius:50%;background:#1b3a6b;opacity:.4}

/* Effort badge */
.effort-badge{display:inline-block;font-size:12px;font-weight:600;padding:4px 12px;border-radius:8px;margin-top:2px}

/* ── Mobile ── */
.mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;padding:8px;margin-left:auto}
.mobile-menu-btn span{display:block;width:20px;height:2px;background:#fff;margin:4px 0;border-radius:2px;transition:all .2s}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
.sidebar-overlay.show{display:block}

/* ── Welcome state ── */
.welcome-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 24px;gap:16px}
.welcome-icon{width:56px;height:56px;border-radius:16px;background:#e8f0fb;display:flex;align-items:center;justify-content:center}
.welcome-icon svg{width:28px;height:28px}
.welcome-title{font-size:18px;font-weight:600;color:#1a2f45}
.welcome-sub{font-size:14px;color:#6a8aaa;max-width:320px;line-height:1.6}

/* Responsive */
@media(max-width:900px){
  .detail-sections{grid-template-columns:1fr}
  .detail-section{border-right:none}
  .detail-section:nth-last-child(-n+2){border-bottom:1px solid #eef4fa}
  .detail-section:last-child{border-bottom:none}
}
@media(max-width:720px){
  .levels-grid{grid-template-columns:1fr}
  .body{overflow:visible}
  .sidebar{position:fixed;left:-290px;top:0;bottom:0;z-index:50;transition:left .25s ease;width:280px;overflow-y:auto}
  .sidebar.open{left:0}
  .main{padding:16px}
  .mobile-menu-btn{display:block}
  .topbar-sub{display:none}
  .topbar-tag{display:none}
}
@media(max-width:480px){
  .domain-header-card{padding:16px}
  .domain-name{font-size:18px}
  .detail-section{padding:14px 16px}
}
</style>
</head>

let activeDomain = null;
let activeLevel = null;

function Title(str){ return str; }

function badgeStyle(d){
  if(d.isCore) return `background:#e0f4ee;color:#085041`;
  if(d.isNew)  return `background:#fef9c3;color:#713f12`;
  return `background:#e8f0fb;color:#1b3a6b`;
}

function effortColor(e){
  const el = e.toLowerCase();
  if(el.includes('low')) return {bg:'#dcfce7',t:'#14532d'};
  if(el.includes('high')) return {bg:'#fee2e2',t:'#7f1d1d'};
  if(el.includes('ongoing')) return {bg:'#dbeafe',t:'#1e3a5f'};
  return {bg:'#fef9c3',t:'#713f12'};
}

function levelStatusStyle(badge){
  const b = badge.toLowerCase();
  if(b.includes('current')||b.includes('deployed')) return {bg:'#dcfce7',t:'#14532d',nc:'#16a34a',nt:'#fff'};
  if(b.includes('near')) return {bg:'#fef9c3',t:'#713f12',nc:'#ca8a04',nt:'#fff'};
  if(b.includes('medium')) return {bg:'#ede9fe',t:'#3b0764',nc:'#7c3aed',nt:'#fff'};
  if(b.includes('outcome')) return {bg:'#dbeafe',t:'#1e3a5f',nc:'#2563eb',nt:'#fff'};
  if(b.includes('emerging')) return {bg:'#dcfce7',t:'#14532d',nc:'#16a34a',nt:'#fff'};
  if(b.includes('cross')) return {bg:'#dbeafe',t:'#1e3a5f',nc:'#2563eb',nt:'#fff'};
  if(b.includes('core')) return {bg:'#dcfce7',t:'#14532d',nc:'#16a34a',nt:'#fff'};
  return {bg:'#f1f5f9',t:'#475569',nc:'#64748b',nt:'#fff'};
}

function buildSidebar(){
  document.getElementById('domainList').innerHTML = DOMAINS.map((d,i)=>`
    <div class="domain-item">
      <button class="domain-btn${activeDomain===i?' active':''}" onclick="selectDomain(${i})">
        <div class="domain-color" style="background:${d.color}"></div>
        <div class="domain-btn-inner">
          <span class="domain-btn-label">${d.label}</span>
          <span class="domain-btn-badge">${d.badge}</span>
        </div>
        <span class="chevron">&#9654;</span>
      </button>
      <div class="level-list${activeDomain===i?' open':''}" id="levelList${i}">
        ${d.levels.map((lv,j)=>{
          const st = levelStatusStyle(lv.badge);
          return `<button class="level-btn${(activeDomain===i&&activeLevel===j)?' active':''}" onclick="selectLevel(${i},${j},event)">
            <div class="level-num-pill" style="background:${st.nc};color:${st.nt}">${j+1}</div>
            <span class="level-btn-label">${lv.name}</span>
            <span class="level-chevron">&#9654;</span>
          </button>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function buildMain(){
  const welcome = document.getElementById('welcomeState');
  const view = document.getElementById('domainView');

  if(activeDomain===null){
    welcome.style.display='flex';
    view.style.display='none';
    return;
  }

  welcome.style.display='none';
  view.style.display='flex';

  const d = DOMAINS[activeDomain];

  let html = `
    <div class="domain-header-card">
      <div class="domain-header-row">
        <div class="domain-icon-wrap" style="background:${d.colorL}">
          <svg viewBox="0 0 24 24" fill="none" stroke="${d.color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${d.icon}</svg>
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px">
            <div class="domain-name">${d.label}</div>
            <span class="domain-badge-pill" style="${badgeStyle(d)}">${d.badge}</span>
          </div>
          <div class="domain-desc-text">${d.desc}</div>
        </div>
      </div>
    </div>
    <div class="levels-grid">`;

  d.levels.forEach((lv,j)=>{
    const st = levelStatusStyle(lv.badge);
    const isSelected = activeLevel===j;
    const bullets = lv.bullets.map(b=>`<li>${b}</li>`).join('');
    html += `
      <div class="level-card${isSelected?' selected':''}" onclick="selectLevel(${activeDomain},${j},event)" id="card_${j}">
        <div class="level-card-header" style="border-bottom:1px solid ${d.colorL}">
          <div class="level-card-num-row">
            <div class="lc-num" style="background:${st.nc};color:${st.nt}">${j+1}</div>
            <span class="lc-status" style="background:${st.bg};color:${st.t}">${lv.badge}</span>
          </div>
          <div class="level-card-name">${lv.name}</div>
        </div>
        <ul class="level-card-bullets" style="--dot:${d.color}">${bullets}</ul>
      </div>`;
    if(isSelected){
      html += buildDetailPanel(lv, d, j);
    }
  });

  html += `</div>`;
  view.innerHTML = html;

  // Fix bullet dot colors
  view.querySelectorAll('.level-card-bullets li::before').forEach(el=>{
    el.style.background = d.color;
  });
  view.querySelectorAll('.level-card-bullets').forEach(ul=>{
    ul.querySelectorAll('li').forEach(li=>{
      const pseudo = li.querySelector('span.dot-fix');
      if(!pseudo){
        const span = document.createElement('span');
        span.style.cssText=`position:absolute;left:2px;top:6px;width:5px;height:5px;border-radius:50%;background:${d.color};opacity:.4;display:block`;
        span.className='dot-fix';
        li.insertBefore(span, li.firstChild);
      }
    });
  });
}

function buildDetailPanel(lv, d, j){
  const st = levelStatusStyle(lv.badge);
  const det = lv.detail;
  const eff = effortColor(det.effortLevel);

  const iconArch = `<svg class="ds-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`;
  const iconImg  = `<svg class="ds-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>`;
  const iconEff  = `<svg class="ds-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>`;
  const iconPart = `<svg class="ds-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>`;
  const iconOut  = `<svg class="ds-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>`;
  const iconCity = `<svg class="ds-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>`;
  const iconFund = `<svg class="ds-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`;

  return `
  <div class="detail-panel" id="detail_${j}" style="grid-column:1/-1">
    <div class="detail-panel-head">
      <div class="detail-panel-head-num">${j+1}</div>
      <div class="detail-panel-head-name">${lv.name}</div>
      <span class="detail-panel-head-status" style="background:${st.bg};color:${st.t}">${lv.badge}</span>
    </div>
    <div class="detail-sections">
      <div class="detail-section">
        <div class="detail-section-title" style="color:${d.color}">${iconArch} Technical Architecture</div>
        <ul class="detail-list">${det.arch.map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
      <div class="detail-section">
        <div class="detail-section-title" style="color:${d.color}">${iconImg} Imagery Requirements</div>
        <ul class="detail-list">${det.imagery.map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
      <div class="detail-section">
        <div class="detail-section-title" style="color:${d.color}">${iconEff} Implementation Effort</div>
        <span class="effort-badge" style="background:${eff.bg};color:${eff.t}">${det.effortLevel}</span>
        <ul class="detail-list" style="margin-top:8px">${det.effort.slice(1).map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
      <div class="detail-section">
        <div class="detail-section-title" style="color:${d.color}">${iconFund} Top Funders & Alignment</div>
        <ul class="detail-list">${det.funders.map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
      <div class="detail-section" style="grid-column:1/-1;border-bottom:1px solid #eef4fa">
        <div class="detail-section-title" style="color:${d.color}">${iconPart} Partner & Stakeholder Considerations</div>
        <ul class="detail-list" style="columns:2;column-gap:32px">${det.partners.map(x=>`<li style="break-inside:avoid">${x}</li>`).join('')}</ul>
      </div>
      <div class="detail-section" style="grid-column:1/-1;border-bottom:1px solid #eef4fa">
        <div class="detail-section-title" style="color:${d.color}">${iconCity} Priority Cities & Countries for Collaboration</div>
        <ul class="detail-list" style="columns:2;column-gap:32px">${det.cities.map(x=>`<li style="break-inside:avoid">${x}</li>`).join('')}</ul>
      </div>
      <div class="detail-section" style="grid-column:1/-1;border-bottom:none">
        <div class="detail-section-title" style="color:${d.color}">${iconOut} Example Outputs & Metrics</div>
        <ul class="detail-list" style="columns:2;column-gap:32px">${det.outputs.map(x=>`<li style="break-inside:avoid">${x}</li>`).join('')}</ul>
      </div>
    </div>
  </div>`;
}

function selectDomain(i){
  if(activeDomain===i){
    activeDomain=null; activeLevel=null;
  } else {
    activeDomain=i; activeLevel=null;
  }
  buildSidebar();
  buildMain();
  if(window.innerWidth<=720) closeSidebar();
}

function selectLevel(domainIdx, levelIdx, e){
  e && e.stopPropagation();
  if(activeDomain===domainIdx && activeLevel===levelIdx){
    activeLevel=null;
  } else {
    activeDomain=domainIdx;
    activeLevel=levelIdx;
  }
  buildSidebar();
  buildMain();
  setTimeout(()=>{
    const el = document.getElementById(`detail_${levelIdx}`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },50);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

buildSidebar();
</script>
</body>
</html>
